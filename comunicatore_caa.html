<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Comunicatore">
<meta name="theme-color" content="#1D9E75">
<title>Comunicatore CAA</title>
<style>
:root {
  --green: #1D9E75;
  --green-dark: #0F6E56;
  --green-light: #E1F5EE;
  --red: #E24B4A;
  --amber: #EF9F27;
  --blue: #378ADD;
  --gray-bg: #F5F5F3;
  --gray-border: #E0DED6;
  --text: #1a1a1a;
  --text-muted: #666;
  --radius: 14px;
  --radius-sm: 8px;
  --shadow: 0 2px 8px rgba(0,0,0,0.10);
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--gray-bg);
  color: var(--text);
  min-height: 100vh;
  overscroll-behavior: none;
}

/* ===== SCREENS ===== */
.screen { display: none; flex-direction: column; height: 100vh; overflow: hidden; }
.screen.active { display: flex; }

/* ===== USE MODE ===== */
#screen-use { background: var(--gray-bg); }

#sentence-bar {
  background: #fff;
  border-bottom: 1.5px solid var(--gray-border);
  min-height: 86px;
  padding: 10px 12px;
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
  overflow-y: auto;
  max-height: 130px;
}
.sentence-empty {
  color: #aaa;
  font-size: 15px;
  font-style: italic;
  pointer-events: none;
}
.sentence-chip {
  display: flex;
  flex-direction: column;
  align-items: center;
  background: var(--green-light);
  border: 1.5px solid var(--green);
  border-radius: var(--radius-sm);
  padding: 5px 9px;
  gap: 2px;
  cursor: pointer;
  animation: pop .15s ease;
  min-width: 58px;
}
.sentence-chip .c-emoji { font-size: 26px; line-height: 1; }
.sentence-chip .c-img { width: 36px; height: 36px; object-fit: cover; border-radius: 6px; }
.sentence-chip .c-lbl { font-size: 10px; font-weight: 600; color: var(--green-dark); text-align: center; max-width: 64px; }
@keyframes pop { from { transform: scale(0.75); opacity: 0; } to { transform: scale(1); opacity: 1; } }

#action-bar {
  display: flex;
  gap: 8px;
  padding: 8px 12px;
  background: #fff;
  border-bottom: 1px solid var(--gray-border);
}
#btn-speak {
  flex: 1;
  background: var(--green);
  color: #fff;
  border: none;
  border-radius: var(--radius-sm);
  padding: 12px;
  font-size: 17px;
  font-weight: 700;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  -webkit-user-select: none;
}
#btn-speak:active { background: var(--green-dark); transform: scale(0.97); }
#btn-speak svg { flex-shrink: 0; }
#btn-clear {
  background: var(--gray-bg);
  color: var(--text-muted);
  border: 1.5px solid var(--gray-border);
  border-radius: var(--radius-sm);
  padding: 12px 16px;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  white-space: nowrap;
}
#btn-clear:active { transform: scale(0.96); }
#btn-edit-toggle {
  background: var(--gray-bg);
  color: var(--text-muted);
  border: 1.5px solid var(--gray-border);
  border-radius: var(--radius-sm);
  padding: 12px;
  cursor: pointer;
  font-size: 20px;
  display: flex; align-items: center;
}
#btn-edit-toggle:active { transform: scale(0.96); }

#cats-row {
  display: flex;
  gap: 8px;
  padding: 10px 12px 6px;
  overflow-x: auto;
  background: #fff;
  border-bottom: 1px solid var(--gray-border);
  scrollbar-width: none;
}
#cats-row::-webkit-scrollbar { display: none; }
.cat-pill {
  flex-shrink: 0;
  padding: 7px 16px;
  border-radius: 999px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  border: 1.5px solid var(--gray-border);
  background: #fff;
  color: var(--text-muted);
  white-space: nowrap;
  transition: all .15s;
}
.cat-pill.active {
  background: var(--green);
  color: #fff;
  border-color: var(--green);
}

#cards-area {
  flex: 1;
  overflow-y: auto;
  padding: 12px;
}
#cards-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
  gap: 10px;
}
.pecs-card {
  background: #fff;
  border: 1.5px solid var(--gray-border);
  border-radius: var(--radius);
  padding: 14px 8px 10px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  cursor: pointer;
  transition: transform .1s, border-color .1s;
  -webkit-user-select: none;
  min-height: 105px;
  box-shadow: var(--shadow);
}
.pecs-card:active { transform: scale(0.90); border-color: var(--green); }
.pecs-card .card-emoji { font-size: 46px; line-height: 1; }
.pecs-card .card-img { width: 60px; height: 60px; object-fit: cover; border-radius: 10px; }
.pecs-card .card-label {
  font-size: 12px;
  font-weight: 700;
  color: var(--text);
  text-align: center;
  line-height: 1.3;
  word-break: break-word;
}

/* ===== EDIT MODE ===== */
#screen-edit {
  background: var(--gray-bg);
}
#edit-header {
  background: #fff;
  border-bottom: 1.5px solid var(--gray-border);
  padding: 14px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
}
#edit-header h1 { font-size: 18px; font-weight: 700; flex: 1; }
#btn-back-use {
  background: var(--green-light);
  color: var(--green-dark);
  border: none;
  border-radius: var(--radius-sm);
  padding: 8px 14px;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
}

#edit-body { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 16px; }

.edit-section {
  background: #fff;
  border-radius: var(--radius);
  border: 1px solid var(--gray-border);
  overflow: hidden;
}
.edit-section-header {
  padding: 12px 16px;
  font-size: 13px;
  font-weight: 700;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: .05em;
  border-bottom: 1px solid var(--gray-border);
  background: var(--gray-bg);
}

/* Categories list */
#edit-cats-list { padding: 8px 0; }
.edit-cat-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 16px;
  border-bottom: 1px solid var(--gray-border);
  cursor: grab;
}
.edit-cat-row:last-child { border-bottom: none; }
.drag-handle { color: #bbb; font-size: 20px; cursor: grab; flex-shrink: 0; }
.edit-cat-row input[type=text] {
  flex: 1;
  border: 1px solid var(--gray-border);
  border-radius: 6px;
  padding: 7px 10px;
  font-size: 15px;
  font-family: inherit;
  background: var(--gray-bg);
}
.edit-cat-row input[type=text]:focus { outline: 2px solid var(--green); border-color: transparent; }
.btn-icon {
  background: none;
  border: none;
  cursor: pointer;
  font-size: 20px;
  padding: 4px;
  border-radius: 6px;
  color: var(--text-muted);
  line-height: 1;
}
.btn-icon:hover { background: var(--gray-bg); }
.btn-icon.del { color: var(--red); }
.btn-add {
  width: 100%;
  padding: 12px;
  background: var(--green-light);
  color: var(--green-dark);
  border: none;
  border-radius: 0;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  text-align: center;
}
.btn-add:hover { background: #c8eede; }

/* Cards list */
#edit-cards-section { display: flex; flex-direction: column; gap: 12px; }
.edit-cat-block {
  background: #fff;
  border-radius: var(--radius);
  border: 1px solid var(--gray-border);
  overflow: hidden;
}
.edit-cat-block-header {
  padding: 10px 14px;
  background: var(--green-light);
  font-weight: 700;
  font-size: 14px;
  color: var(--green-dark);
  border-bottom: 1px solid #b8ddd0;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.edit-card-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 14px;
  border-bottom: 1px solid var(--gray-border);
  cursor: grab;
}
.edit-card-row:last-child { border-bottom: none; }
.edit-card-thumb {
  width: 44px; height: 44px;
  border-radius: 8px;
  background: var(--gray-bg);
  border: 1px solid var(--gray-border);
  display: flex; align-items: center; justify-content: center;
  font-size: 28px;
  flex-shrink: 0;
  overflow: hidden;
  cursor: pointer;
}
.edit-card-thumb img { width: 100%; height: 100%; object-fit: cover; }
.edit-card-fields { flex: 1; display: flex; flex-direction: column; gap: 5px; }
.edit-card-fields input[type=text] {
  border: 1px solid var(--gray-border);
  border-radius: 6px;
  padding: 6px 9px;
  font-size: 14px;
  font-family: inherit;
  background: var(--gray-bg);
  width: 100%;
}
.edit-card-fields input[type=text]:focus { outline: 2px solid var(--green); border-color: transparent; }
.edit-card-meta {
  display: flex;
  gap: 6px;
  align-items: center;
  flex-wrap: wrap;
}
.edit-card-meta select {
  border: 1px solid var(--gray-border);
  border-radius: 6px;
  padding: 5px 8px;
  font-size: 13px;
  font-family: inherit;
  background: var(--gray-bg);
  flex: 1;
  min-width: 0;
}
.edit-card-meta select:focus { outline: 2px solid var(--green); }
.btn-audio {
  background: var(--gray-bg);
  border: 1px solid var(--gray-border);
  border-radius: 6px;
  padding: 5px 9px;
  font-size: 13px;
  cursor: pointer;
  white-space: nowrap;
  font-family: inherit;
  color: var(--text-muted);
}
.btn-audio.has-audio { background: #E1F5EE; color: var(--green-dark); border-color: var(--green); }
.btn-audio:active { transform: scale(0.97); }

/* ===== PIN MODAL ===== */
#pin-modal {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 999;
  align-items: center;
  justify-content: center;
}
#pin-modal.open { display: flex; }
#pin-box {
  background: #fff;
  border-radius: var(--radius);
  padding: 28px 24px;
  width: 300px;
  display: flex;
  flex-direction: column;
  gap: 16px;
  align-items: center;
  box-shadow: 0 8px 32px rgba(0,0,0,0.2);
}
#pin-box h2 { font-size: 18px; font-weight: 700; }
#pin-box p { font-size: 14px; color: var(--text-muted); text-align: center; }
#pin-dots { display: flex; gap: 10px; }
.pin-dot {
  width: 14px; height: 14px;
  border-radius: 50%;
  background: var(--gray-border);
  transition: background .1s;
}
.pin-dot.filled { background: var(--green); }
#pin-keypad {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  width: 100%;
}
.pin-key {
  background: var(--gray-bg);
  border: 1px solid var(--gray-border);
  border-radius: 10px;
  padding: 14px;
  font-size: 20px;
  font-weight: 700;
  cursor: pointer;
  text-align: center;
  font-family: inherit;
}
.pin-key:active { background: var(--green-light); transform: scale(0.93); }
.pin-key.del { font-size: 16px; color: var(--red); }
.pin-key.cancel { font-size: 13px; color: var(--text-muted); }
#pin-error { color: var(--red); font-size: 13px; display: none; }

/* ===== TOAST ===== */
#toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: #222;
  color: #fff;
  padding: 10px 22px;
  border-radius: 999px;
  font-size: 14px;
  font-weight: 600;
  opacity: 0;
  pointer-events: none;
  transition: all .25s;
  z-index: 1000;
  white-space: nowrap;
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* hidden inputs */
.hidden-input { display: none; }

/* recording indicator */
.btn-audio.recording { background: #fdecea; color: var(--red); border-color: var(--red); animation: pulse 1s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }
</style>
</head>

<!-- USE SCREEN -->
<div id="screen-use" class="screen active">
  <div id="sentence-bar">
    <span class="sentence-empty" id="sentence-ph">Tocca le schede per costruire una frase...</span>
  </div>
  <div id="action-bar">
    <button id="btn-speak" onclick="speakSentence()">
      <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"><path d="M11 5L6 9H2v6h4l5 4V5z"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
      Pronuncia
    </button>
    <button id="btn-clear" onclick="clearSentence()">🗑 Cancella</button>
    <button id="btn-edit-toggle" onclick="requestEdit()" title="Modifica">⚙️</button>
  </div>
  <div id="cats-row"></div>
  <div id="cards-area"><div id="cards-grid"></div></div>
</div>

<!-- EDIT SCREEN -->
<div id="screen-edit" class="screen">
  <div id="edit-header">
    <button id="btn-back-use" onclick="goToUse()">← Usa</button>
    <h1>⚙️ Modifica</h1>
    <button class="btn-icon" onclick="showPinChange()" title="Cambia PIN" style="font-size:16px;color:var(--text-muted);border:1px solid var(--gray-border);border-radius:8px;padding:6px 10px;background:var(--gray-bg);">🔑 PIN</button>
  </div>
  <div id="edit-body">
    <!-- Categories -->
    <div class="edit-section">
      <div class="edit-section-header">Categorie</div>
      <div id="edit-cats-list"></div>
      <button class="btn-add" onclick="addCategory()">+ Aggiungi categoria</button>
    </div>
    <!-- Cards -->
    <div id="edit-cards-section"></div>
    <!-- Add card buttons -->
    <div id="edit-add-card-btns" style="display:flex;flex-direction:column;gap:8px;"></div>
  </div>
</div>

<!-- PIN MODAL -->
<div id="pin-modal">
  <div id="pin-box">
    <h2 id="pin-title">🔒 Inserisci PIN</h2>
    <p id="pin-subtitle">Area riservata ai genitori</p>
    <div id="pin-dots">
      <div class="pin-dot" id="d0"></div>
      <div class="pin-dot" id="d1"></div>
      <div class="pin-dot" id="d2"></div>
      <div class="pin-dot" id="d3"></div>
    </div>
    <span id="pin-error">PIN errato, riprova</span>
    <div id="pin-keypad">
      <button class="pin-key" onclick="pinKey('1')">1</button>
      <button class="pin-key" onclick="pinKey('2')">2</button>
      <button class="pin-key" onclick="pinKey('3')">3</button>
      <button class="pin-key" onclick="pinKey('4')">4</button>
      <button class="pin-key" onclick="pinKey('5')">5</button>
      <button class="pin-key" onclick="pinKey('6')">6</button>
      <button class="pin-key" onclick="pinKey('7')">7</button>
      <button class="pin-key" onclick="pinKey('8')">8</button>
      <button class="pin-key" onclick="pinKey('9')">9</button>
      <button class="pin-key cancel" onclick="pinCancel()">Annulla</button>
      <button class="pin-key" onclick="pinKey('0')">0</button>
      <button class="pin-key del" onclick="pinDel()">⌫</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<!-- Hidden file inputs -->
<input type="file" id="inp-img" class="hidden-input" accept="image/*">
<input type="file" id="inp-audio" class="hidden-input" accept="audio/*">

  ]
};

function loadData() {
  try {
    const s = localStorage.getItem("caa_data");
    if (s) return JSON.parse(s);
  } catch(e) {}
  return JSON.parse(JSON.stringify(DEFAULT_DATA));
}
function saveData() {
  localStorage.setItem("caa_data", JSON.stringify(APP));
}

let APP = loadData();
let currentCatId = APP.categories[0]?.id || null;
let sentence = [];
let pinMode = "unlock"; // "unlock" | "change_old" | "change_new"
let pinBuffer = "";
let pinOldCandidate = "";

// ===================== USE MODE =====================
function renderCatPills() {
  const row = document.getElementById("cats-row");
  const cats = [...APP.categories].sort((a,b) => a.order - b.order);
  row.innerHTML = cats.map(c =>
    `<button class="cat-pill${c.id === currentCatId ? " active" : ""}" onclick="selectCat('${c.id}')">${c.name}</button>`
  ).join("");
}

function selectCat(id) {
  currentCatId = id;
  renderCatPills();
  renderCards();
}

function renderCards() {
  const grid = document.getElementById("cards-grid");
  const cards = APP.cards.filter(c => c.catId === currentCatId).sort((a,b) => a.order - b.order);
  if (!cards.length) {
    grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;color:#aaa;padding:32px;font-size:15px;">Nessuna scheda in questa categoria.<br>Aggiungile dalla modalità ⚙️ Modifica.</div>`;
    return;
  }
  grid.innerHTML = cards.map(card => {
    const thumb = card.img
      ? `<img class="card-img" src="${card.img}" alt="${card.label}">`
      : `<span class="card-emoji">${card.emoji || "❓"}</span>`;
    return `<div class="pecs-card" onclick="cardTap('${card.id}')">${thumb}<span class="card-label">${card.label}</span></div>`;
  }).join("");
}

function cardTap(id) {
  const card = APP.cards.find(c => c.id === id);
  if (!card) return;
  sentence.push(card);
  renderSentenceBar();
  // play audio or TTS
  if (card.audio) {
    const a = new Audio(card.audio);
    a.play().catch(()=>{});
  } else {
    tts(card.label);
  }
}

function renderSentenceBar() {
  const bar = document.getElementById("sentence-bar");
  const ph = document.getElementById("sentence-ph");
  if (!sentence.length) {
    ph.style.display = "";
    bar.querySelectorAll(".sentence-chip").forEach(e => e.remove());
    return;
  }
  ph.style.display = "none";
  bar.querySelectorAll(".sentence-chip").forEach(e => e.remove());
  sentence.forEach((card, i) => {
    const chip = document.createElement("div");
    chip.className = "sentence-chip";
    const thumb = card.img
      ? `<img class="c-img" src="${card.img}" alt="${card.label}">`
      : `<span class="c-emoji">${card.emoji || "❓"}</span>`;
    chip.innerHTML = `${thumb}<span class="c-lbl">${card.label}</span>`;
    chip.onclick = () => { sentence.splice(i, 1); renderSentenceBar(); };
    bar.appendChild(chip);
  });
  bar.scrollTop = bar.scrollHeight;
}

function clearSentence() {
  sentence = [];
  renderSentenceBar();
}

function speakSentence() {
  if (!sentence.length) return;
  // Play audios sequentially, fallback to TTS
  let i = 0;
  function playNext() {
    if (i >= sentence.length) return;
    const card = sentence[i++];
    if (card.audio) {
      const a = new Audio(card.audio);
      a.onended = playNext;
      a.play().catch(playNext);
    } else {
      tts(card.label, playNext);
    }
  }
  playNext();
}

function tts(text, onEnd) {
  if (!window.speechSynthesis) { if(onEnd) onEnd(); return; }
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = "it-IT";
  u.rate = 0.85;
  if (onEnd) u.onend = onEnd;
  window.speechSynthesis.speak(u);
}

// ===================== PIN =====================
function requestEdit() {
  pinMode = "unlock";
  pinBuffer = "";
  updatePinUI();
  document.getElementById("pin-title").textContent = "🔒 Inserisci PIN";
  document.getElementById("pin-subtitle").textContent = "Area riservata ai genitori  (default: 1234)";
  document.getElementById("pin-error").style.display = "none";
  document.getElementById("pin-modal").classList.add("open");
}

function showPinChange() {
  pinMode = "change_old";
  pinBuffer = "";
  updatePinUI();
  document.getElementById("pin-title").textContent = "🔑 PIN attuale";
  document.getElementById("pin-subtitle").textContent = "Inserisci il PIN attuale per modificarlo";
  document.getElementById("pin-error").style.display = "none";
  document.getElementById("pin-modal").classList.add("open");
}

function pinKey(k) {
  if (pinBuffer.length >= 4) return;
  pinBuffer += k;
  updatePinUI();
  if (pinBuffer.length === 4) setTimeout(pinSubmit, 150);
}
function pinDel() { pinBuffer = pinBuffer.slice(0, -1); updatePinUI(); }
function pinCancel() {
  document.getElementById("pin-modal").classList.remove("open");
  pinBuffer = "";
}
function updatePinUI() {
  for (let i=0;i<4;i++) document.getElementById("d"+i).className = "pin-dot" + (i < pinBuffer.length ? " filled" : "");
}
function pinSubmit() {
  if (pinMode === "unlock") {
    if (pinBuffer === APP.pin) {
      document.getElementById("pin-modal").classList.remove("open");
      goToEdit();
    } else {
      document.getElementById("pin-error").style.display = "block";
      pinBuffer = "";
      updatePinUI();
    }
  } else if (pinMode === "change_old") {
    if (pinBuffer === APP.pin) {
      pinMode = "change_new";
      pinOldCandidate = pinBuffer;
      pinBuffer = "";
      updatePinUI();
      document.getElementById("pin-title").textContent = "🔑 Nuovo PIN";
      document.getElementById("pin-subtitle").textContent = "Scegli un nuovo PIN a 4 cifre";
      document.getElementById("pin-error").style.display = "none";
    } else {
      document.getElementById("pin-error").style.display = "block";
      pinBuffer = "";
      updatePinUI();
    }
  } else if (pinMode === "change_new") {
    APP.pin = pinBuffer;
    saveData();
    document.getElementById("pin-modal").classList.remove("open");
    pinBuffer = "";
    showToast("✅ PIN aggiornato!");
  }
}

// ===================== EDIT MODE =====================
function goToEdit() {
  document.getElementById("screen-use").classList.remove("active");
  document.getElementById("screen-edit").classList.add("active");
  renderEditScreen();
}
function goToUse() {
  document.getElementById("screen-edit").classList.remove("active");
  document.getElementById("screen-use").classList.add("active");
  renderCatPills();
  renderCards();
}

function renderEditScreen() {
  renderEditCats();
  renderEditCards();
}

// --- Edit categories ---
function renderEditCats() {
  const list = document.getElementById("edit-cats-list");
  const cats = [...APP.categories].sort((a,b) => a.order - b.order);
  list.innerHTML = cats.map((cat, idx) => `
    <div class="edit-cat-row" draggable="true" data-catid="${cat.id}"
      ondragstart="dragCatStart(event,'${cat.id}')"
      ondragover="dragOver(event)"
      ondrop="dropCat(event,'${cat.id}')">
      <span class="drag-handle">☰</span>
      <input type="text" value="${escHtml(cat.name)}" 
        onchange="renameCat('${cat.id}',this.value)"
        placeholder="Nome categoria">
      <button class="btn-icon del" onclick="deleteCategory('${cat.id}')" title="Elimina">🗑</button>
    </div>
  `).join("");
}

let dragCatId = null;
function dragCatStart(e, id) { dragCatId = id; e.dataTransfer.effectAllowed = "move"; }
function dragOver(e) { e.preventDefault(); e.dataTransfer.dropEffect = "move"; }
function dropCat(e, targetId) {
  e.preventDefault();
  if (!dragCatId || dragCatId === targetId) return;
  const cats = [...APP.categories].sort((a,b) => a.order - b.order);
  const fromIdx = cats.findIndex(c => c.id === dragCatId);
  const toIdx   = cats.findIndex(c => c.id === targetId);
  const [moved] = cats.splice(fromIdx, 1);
  cats.splice(toIdx, 0, moved);
  cats.forEach((c, i) => { c.order = i; });
  saveData();
  renderEditCats();
  renderEditCards();
  dragCatId = null;
}

function renameCat(id, val) {
  const cat = APP.categories.find(c => c.id === id);
  if (cat) { cat.name = val; saveData(); }
}

function addCategory() {
  const id = "cat_" + Date.now();
  const maxOrder = APP.categories.reduce((m,c) => Math.max(m,c.order), -1);
  APP.categories.push({ id, name: "📁 Nuova categoria", order: maxOrder + 1 });
  saveData();
  renderEditCats();
  renderEditCards();
  showToast("Categoria aggiunta!");
}

function deleteCategory(id) {
  const cardCount = APP.cards.filter(c => c.catId === id).length;
  if (cardCount > 0) {
    if (!confirm(`Questa categoria contiene ${cardCount} schede. Eliminando la categoria le schede verranno spostate in "Senza categoria". Continuare?`)) return;
    // orphan cards
    APP.cards.filter(c => c.catId === id).forEach(c => {
      c.catId = "__uncategorized__";
    });
  }
  APP.categories = APP.categories.filter(c => c.id !== id);
  saveData();
  renderEditCats();
  renderEditCards();
  showToast("Categoria eliminata");
}

// --- Edit cards ---
let dragCardId = null;
function renderEditCards() {
  const section = document.getElementById("edit-cards-section");
  const addBtns = document.getElementById("edit-add-card-btns");
  const cats = [...APP.categories].sort((a,b) => a.order - b.order);

  section.innerHTML = cats.map(cat => {
    const cards = APP.cards.filter(c => c.catId === cat.id).sort((a,b) => a.order - b.order);
    const cardRows = cards.map(card => renderEditCardRow(card, cats)).join("");
    return `
      <div class="edit-cat-block">
        <div class="edit-cat-block-header">
          ${escHtml(cat.name)}
          <span style="font-size:12px;color:#4a9;font-weight:500;">${cards.length} schede</span>
        </div>
        ${cardRows}
        <button class="btn-add" onclick="addCard('${cat.id}')">+ Aggiungi scheda a "${escHtml(cat.name)}"</button>
      </div>`;
  }).join("");
  addBtns.innerHTML = "";
}

function renderEditCardRow(card, cats) {
  const audioLabel = card.audio ? "🔊 Audio caricato" : "🎙 Aggiungi audio";
  const catsOptions = cats.map(c => `<option value="${c.id}"${c.id===card.catId?" selected":""}>${escHtml(c.name)}</option>`).join("");
  const thumb = card.img
    ? `<img src="${card.img}" style="width:100%;height:100%;object-fit:cover;border-radius:8px;">`
    : `<span style="font-size:28px;">${card.emoji||"❓"}</span>`;
  return `
    <div class="edit-card-row" draggable="true" data-cardid="${card.id}"
      ondragstart="dragCardStart(event,'${card.id}')"
      ondragover="dragOver(event)"
      ondrop="dropCard(event,'${card.id}')">
      <span class="drag-handle" style="font-size:18px;">☰</span>
      <div class="edit-card-thumb" onclick="pickImage('${card.id}')" title="Tocca per cambiare immagine">${thumb}</div>
      <div class="edit-card-fields">
        <input type="text" value="${escHtml(card.label)}" placeholder="Nome scheda"
          onchange="renameCard('${card.id}',this.value)">
        <div class="edit-card-meta">
          <input type="text" value="${escHtml(card.emoji||'')}" placeholder="Emoji (es: 🍕)" maxlength="4" style="max-width:72px;"
            onchange="setCardEmoji('${card.id}',this.value)">
          <select onchange="moveCard('${card.id}',this.value)">${catsOptions}</select>
          <button class="btn-audio${card.audio?' has-audio':''}" id="abtn_${card.id}" onclick="handleAudio('${card.id}')">${audioLabel}</button>
        </div>
      </div>
      <button class="btn-icon del" onclick="deleteCard('${card.id}')">🗑</button>
    </div>`;
}

function dragCardStart(e, id) { dragCardId = id; e.dataTransfer.effectAllowed = "move"; }
function dropCard(e, targetId) {
  e.preventDefault();
  if (!dragCardId || dragCardId === targetId) return;
  const from = APP.cards.find(c => c.id === dragCardId);
  const to   = APP.cards.find(c => c.id === targetId);
  if (!from || !to) return;
  // move to same category as target
  const catCards = APP.cards.filter(c => c.catId === to.catId).sort((a,b) => a.order - b.order);
  const fromInCat = catCards.findIndex(c => c.id === dragCardId);
  const toInCat   = catCards.findIndex(c => c.id === targetId);
  if (from.catId !== to.catId) {
    from.catId = to.catId;
    catCards.push(from);
  }
  const idx = catCards.findIndex(c => c.id === dragCardId);
  const [moved] = catCards.splice(idx, 1);
  const toIdx2 = catCards.findIndex(c => c.id === targetId);
  catCards.splice(toIdx2, 0, moved);
  catCards.forEach((c, i) => { c.order = i; });
  saveData();
  renderEditCards();
  dragCardId = null;
}

function renameCard(id, val) {
  const card = APP.cards.find(c => c.id === id);
  if (card) { card.label = val; saveData(); }
}
function setCardEmoji(id, val) {
  const card = APP.cards.find(c => c.id === id);
  if (card) { card.emoji = val; saveData(); }
}
function moveCard(id, newCatId) {
  const card = APP.cards.find(c => c.id === id);
  if (!card) return;
  card.catId = newCatId;
  const catCards = APP.cards.filter(c => c.catId === newCatId).sort((a,b)=>a.order-b.order);
  card.order = catCards.length - 1;
  saveData();
  showToast("Scheda spostata!");
  setTimeout(renderEditCards, 300);
}
function addCard(catId) {
  const id = "card_" + Date.now();
  const catCards = APP.cards.filter(c => c.catId === catId);
  APP.cards.push({ id, catId, label: "Nuova scheda", emoji: "❓", img: null, audio: null, order: catCards.length });
  saveData();
  renderEditCards();
  showToast("Scheda aggiunta!");
}
function deleteCard(id) {
  APP.cards = APP.cards.filter(c => c.id !== id);
  saveData();
  renderEditCards();
  showToast("Scheda eliminata");
}

// ---- Image picker ----
let pendingImgCardId = null;
function pickImage(cardId) {
  pendingImgCardId = cardId;
  const inp = document.getElementById("inp-img");
  inp.value = "";
  inp.click();
}
document.getElementById("inp-img").onchange = function() {
  const file = this.files[0];
  if (!file || !pendingImgCardId) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    const card = APP.cards.find(c => c.id === pendingImgCardId);
    if (card) {
      card.img = e.target.result;
      saveData();
      renderEditCards();
      showToast("Immagine caricata!");
    }
  };
  reader.readAsDataURL(file);
};

// ---- Audio ----
let pendingAudioCardId = null;
let mediaRecorder = null;
let audioChunks = [];
let recordingCardId = null;

function handleAudio(cardId) {
  const card = APP.cards.find(c => c.id === cardId);
  if (!card) return;
  if (card.audio) {
    // play or reset
    const choice = confirm("Scheda: "" + card.label + ""\n\n🔊 Premi OK per ascoltare l'audio\n🗑 Premi Annulla per eliminarlo e registrarne uno nuovo");
    if (choice) {
      const a = new Audio(card.audio);
      a.play().catch(()=>{});
    } else {
      card.audio = null;
      saveData();
      renderEditCards();
      showToast("Audio rimosso");
    }
    return;
  }
  // No audio: offer record or upload
  const choice2 = confirm("Scheda: "" + card.label + ""\n\n🎙 OK = Registra con il microfono\n📂 Annulla = Carica un file audio");
  if (choice2) {
    startRecording(cardId);
  } else {
    pendingAudioCardId = cardId;
    document.getElementById("inp-audio").value = "";
    document.getElementById("inp-audio").click();
  }
}

document.getElementById("inp-audio").onchange = function() {
  const file = this.files[0];
  if (!file || !pendingAudioCardId) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    const card = APP.cards.find(c => c.id === pendingAudioCardId);
    if (card) {
      card.audio = e.target.result;
      saveData();
      renderEditCards();
      showToast("Audio caricato!");
    }
  };
  reader.readAsDataURL(file);
};

function startRecording(cardId) {
  if (!navigator.mediaDevices) { alert("Il tuo browser non supporta la registrazione."); return; }
  navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
    recordingCardId = cardId;
    audioChunks = [];
    mediaRecorder = new MediaRecorder(stream);
    mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
    mediaRecorder.onstop = () => {
      const blob = new Blob(audioChunks, { type: "audio/webm" });
      const reader = new FileReader();
      reader.onload = function(e) {
        const card = APP.cards.find(c => c.id === recordingCardId);
        if (card) {
          card.audio = e.target.result;
          saveData();
          renderEditCards();
          showToast("Registrazione salvata!");
        }
        stream.getTracks().forEach(t => t.stop());
      };
      reader.readAsDataURL(blob);
    };
    mediaRecorder.start();
    const btn = document.getElementById("abtn_" + cardId);
    if (btn) { btn.textContent = "⏹ Ferma registrazione"; btn.classList.add("recording"); }
    showToast("🔴 Registrazione in corso... tocca di nuovo il pulsante per fermare");
    // intercept next tap on same button
    const stopRec = () => {
      if (mediaRecorder && mediaRecorder.state !== "inactive") mediaRecorder.stop();
    };
    if (btn) { btn.onclick = stopRec; }
  }).catch(() => { alert("Impossibile accedere al microfono. Prova a caricare un file audio."); });
}

// ===================== UTILS =====================
function escHtml(s) {
  return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}
function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  clearTimeout(window._toastTimer);
  window._toastTimer = setTimeout(() => t.classList.remove("show"), 2200);
}

// ===================== INIT =====================
renderCatPills();
renderCards();
</script>
