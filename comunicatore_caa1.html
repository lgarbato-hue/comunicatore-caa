<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1D9E75">
<link rel="manifest" href="manifest.json">
<title>Comunicatore CAA</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#f0f0ee;color:#1a1a1a;height:100vh;overflow:hidden;display:flex;flex-direction:column}

#bar{background:#fff;border-bottom:3px solid #ddd;min-height:86px;max-height:120px;padding:10px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;overflow-y:auto;flex-shrink:0}
.ph{color:#bbb;font-size:15px;font-style:italic}
.chip{display:flex;flex-direction:column;align-items:center;background:#e1f5ee;border:2px solid #1D9E75;border-radius:10px;padding:6px 10px;cursor:pointer;min-width:56px}
.chip .ce{font-size:24px}
.chip img{width:32px;height:32px;object-fit:cover;border-radius:5px}
.chip .cl{font-size:10px;font-weight:700;color:#0F6E56;text-align:center}

#actions{display:flex;gap:8px;padding:10px;background:#fff;border-bottom:2px solid #ddd;flex-shrink:0}
#btnSpeak{flex:1;background:#1D9E75;color:#fff;border:none;border-radius:12px;padding:15px;font-size:19px;font-weight:800;cursor:pointer}
#btnClear{background:#f0f0ee;border:2px solid #ddd;border-radius:12px;padding:15px 18px;font-size:20px;cursor:pointer}
#btnEdit{background:#f0f0ee;border:2px solid #ddd;border-radius:12px;padding:15px;font-size:20px;cursor:pointer}

#main{flex:1;overflow-y:auto;padding:12px}

/* HOME */
#catGrid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.catTile{border-radius:20px;padding:22px 12px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;cursor:pointer;min-height:130px;border:3px solid transparent}
.catTile:active{opacity:0.7;transform:scale(0.93)}
.catTile .te{font-size:52px;line-height:1}
.catTile .tl{font-size:16px;font-weight:800;text-align:center}
.c0{background:#FFF3E0;border-color:#FFB74D;color:#E65100}
.c1{background:#FFF9C4;border-color:#F9A825;color:#F57F17}
.c2{background:#E8F5E9;border-color:#66BB6A;color:#2E7D32}
.c3{background:#E3F2FD;border-color:#42A5F5;color:#0D47A1}
.c4{background:#F3E5F5;border-color:#AB47BC;color:#6A1B9A}
.c5{background:#FCE4EC;border-color:#EC407A;color:#880E4F}
.c6{background:#E0F7FA;border-color:#26C6DA;color:#006064}
.c7{background:#FBE9E7;border-color:#FF7043;color:#BF360C}
.c8{background:#F1F8E9;border-color:#9CCC65;color:#33691E}
.c9{background:#EDE7F6;border-color:#7E57C2;color:#311B92}

/* CARDS VIEW */
#cardsView{display:none}
#backBtn{width:100%;display:flex;align-items:center;gap:10px;background:#fff;border:2px solid #ddd;border-radius:12px;padding:12px 16px;font-size:16px;font-weight:700;cursor:pointer;margin-bottom:12px}
#catLabel{font-size:18px;font-weight:800;margin-bottom:12px}
#cardGrid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.card{background:#fff;border:3px solid #ddd;border-radius:18px;padding:16px 10px 12px;display:flex;flex-direction:column;align-items:center;gap:8px;cursor:pointer;min-height:125px;box-shadow:0 2px 8px rgba(0,0,0,.07)}
.card:active{transform:scale(0.88);border-color:#1D9E75}
.card .ce{font-size:50px;line-height:1}
.card img{width:68px;height:68px;object-fit:cover;border-radius:10px}
.card .cl{font-size:13px;font-weight:700;text-align:center;line-height:1.3;color:#222}

/* EDIT */
#editScreen{display:none;flex-direction:column;height:100vh;overflow:hidden;background:#f0f0ee;position:fixed;inset:0;z-index:100}
#editScreen.show{display:flex}
#eHeader{background:#fff;border-bottom:2px solid #ddd;padding:13px 14px;display:flex;align-items:center;gap:10px;flex-shrink:0}
#eHeader h1{flex:1;font-size:16px;font-weight:800}
.eback{background:#e1f5ee;color:#0F6E56;border:none;border-radius:8px;padding:8px 14px;font-size:14px;font-weight:700;cursor:pointer}
#eBody{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:12px}
.esec{background:#fff;border-radius:14px;border:1px solid #ddd;overflow:hidden}
.esec-hd{padding:9px 13px;background:#f8f8f6;font-size:11px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid #ddd}
.erow{display:flex;align-items:center;gap:7px;padding:9px 13px;border-bottom:1px solid #f0f0ee}
.erow:last-child{border-bottom:none}
.dh{color:#ccc;font-size:17px;flex-shrink:0}
.erow input{flex:1;border:1px solid #ddd;border-radius:6px;padding:7px 9px;font-size:14px;font-family:inherit;background:#f8f8f8}
.bdel{background:none;border:none;font-size:17px;cursor:pointer;color:#E24B4A;padding:3px}
.badd{width:100%;padding:12px;background:#e1f5ee;color:#0F6E56;border:none;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}
.cblock{background:#fff;border-radius:14px;border:1px solid #ddd;overflow:hidden;margin-bottom:0}
.cblock-hd{padding:9px 13px;background:#e1f5ee;font-weight:700;font-size:13px;color:#0F6E56;border-bottom:1px solid #b8ddd0;display:flex;justify-content:space-between;align-items:center}
.crow{display:flex;align-items:center;gap:7px;padding:9px 11px;border-bottom:1px solid #f0f0ee}
.crow:last-child{border-bottom:none}
.cthumb{width:40px;height:40px;border-radius:7px;background:#f0f0ee;border:1px solid #ddd;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0;overflow:hidden;cursor:pointer}
.cthumb img{width:100%;height:100%;object-fit:cover}
.cfields{flex:1;display:flex;flex-direction:column;gap:4px}
.cfields input{border:1px solid #ddd;border-radius:5px;padding:5px 8px;font-size:13px;font-family:inherit;background:#f8f8f8;width:100%}
.cmeta{display:flex;gap:4px;flex-wrap:wrap;align-items:center}
.cmeta select{border:1px solid #ddd;border-radius:5px;padding:4px 6px;font-size:12px;font-family:inherit;background:#f8f8f8;flex:1;min-width:0}
.baudio{background:#f8f8f8;border:1px solid #ddd;border-radius:5px;padding:4px 7px;font-size:12px;cursor:pointer;font-family:inherit;color:#666;white-space:nowrap}
.baudio.has{background:#e1f5ee;color:#0F6E56;border-color:#1D9E75}
.baudio.rec{background:#fdecea;color:#E24B4A;border-color:#E24B4A}

#pinModal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:999;align-items:center;justify-content:center}
#pinModal.show{display:flex}
#pinBox{background:#fff;border-radius:18px;padding:26px 20px;width:290px;display:flex;flex-direction:column;gap:13px;align-items:center}
#pinBox h2{font-size:17px;font-weight:800}
#pinBox p{font-size:13px;color:#888;text-align:center}
#pinDots{display:flex;gap:10px}
.pd{width:13px;height:13px;border-radius:50%;background:#ddd}
.pd.on{background:#1D9E75}
#pinKp{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;width:100%}
.pk{background:#f0f0ee;border:1px solid #ddd;border-radius:10px;padding:14px;font-size:20px;font-weight:800;cursor:pointer;font-family:inherit;text-align:center}
.pk:active{background:#e1f5ee}
.pk.del{font-size:15px;color:#E24B4A}
.pk.can{font-size:12px;color:#888}
#pinErr{color:#E24B4A;font-size:12px;display:none}
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#222;color:#fff;padding:9px 20px;border-radius:999px;font-size:13px;font-weight:600;opacity:0;pointer-events:none;transition:opacity .2s;z-index:1000}
#toast.show{opacity:1}
.hidden{display:none}
</style>
</head>
<body>

<div id="bar"><span class="ph" id="ph">Tocca le schede per costruire una frase...</span></div>
<div id="actions">
  <button id="btnSpeak" onclick="speakAll()">🔊 Pronuncia</button>
  <button id="btnClear" onclick="clearAll()">🗑</button>
  <button id="btnEdit" onclick="askPin()">⚙️</button>
</div>
<div id="main">
  <div id="catGrid"></div>
  <div id="cardsView">
    <button id="backBtn" onclick="goHome()">← Categorie</button>
    <div id="catLabel"></div>
    <div id="cardGrid"></div>
  </div>
</div>

<div id="editScreen">
  <div id="eHeader">
    <button class="eback" onclick="goUse()">← Usa</button>
    <h1>⚙️ Modifica</h1>
    <button onclick="showPinChange()" style="border:1px solid #ddd;border-radius:7px;padding:6px 10px;font-size:12px;background:#f8f8f8;cursor:pointer">🔑 PIN</button>
  </div>
  <div id="eBody">
    <div class="esec">
      <div class="esec-hd">Categorie</div>
      <div id="ecats"></div>
      <button class="badd" onclick="addCat()">+ Aggiungi categoria</button>
    </div>
    <div id="ecards"></div>
  </div>
</div>

<div id="pinModal">
  <div id="pinBox">
    <h2 id="ptitle">🔒 PIN</h2>
    <p id="psub">Area genitori (default: 1234)</p>
    <div id="pinDots">
      <div class="pd" id="pd0"></div><div class="pd" id="pd1"></div>
      <div class="pd" id="pd2"></div><div class="pd" id="pd3"></div>
    </div>
    <span id="pinErr">PIN errato</span>
    <div id="pinKp">
      <button class="pk" onclick="pk('1')">1</button><button class="pk" onclick="pk('2')">2</button><button class="pk" onclick="pk('3')">3</button>
      <button class="pk" onclick="pk('4')">4</button><button class="pk" onclick="pk('5')">5</button><button class="pk" onclick="pk('6')">6</button>
      <button class="pk" onclick="pk('7')">7</button><button class="pk" onclick="pk('8')">8</button><button class="pk" onclick="pk('9')">9</button>
      <button class="pk can" onclick="pkCancel()">Annulla</button><button class="pk" onclick="pk('0')">0</button><button class="pk del" onclick="pkDel()">⌫</button>
    </div>
  </div>
</div>

<div id="toast"></div>
<input type="file" id="inpImg" class="hidden" accept="image/*">
<input type="file" id="inpAud" class="hidden" accept="audio/*">

<script>
var COLORS = ["c0","c1","c2","c3","c4","c5","c6","c7","c8","c9"];
var DEF = {
  pin:"1234",
  cats:[
    {id:"bisogni",name:"Bisogni",e:"🟠",o:0},
    {id:"emozioni",name:"Emozioni",e:"💛",o:1},
    {id:"cibo",name:"Cibo",e:"🍽️",o:2},
    {id:"attivita",name:"Attività",e:"🎮",o:3},
    {id:"persone",name:"Persone",e:"👨‍👩‍👧",o:4},
    {id:"risposte",name:"Risposte",e:"✅",o:5}
  ],
  cards:[
    {id:"b1",c:"bisogni",l:"Ho fame",e:"🍕",img:null,aud:null,o:0},
    {id:"b2",c:"bisogni",l:"Ho sete",e:"💧",img:null,aud:null,o:1},
    {id:"b3",c:"bisogni",l:"Bagno",e:"🚽",img:null,aud:null,o:2},
    {id:"b4",c:"bisogni",l:"Sono stanco",e:"😴",img:null,aud:null,o:3},
    {id:"b5",c:"bisogni",l:"Mi fa male",e:"🤕",img:null,aud:null,o:4},
    {id:"b6",c:"bisogni",l:"Ho freddo",e:"🥶",img:null,aud:null,o:5},
    {id:"b7",c:"bisogni",l:"Ho caldo",e:"🥵",img:null,aud:null,o:6},
    {id:"b8",c:"bisogni",l:"Sto male",e:"🤢",img:null,aud:null,o:7},
    {id:"e1",c:"emozioni",l:"Felice",e:"😄",img:null,aud:null,o:0},
    {id:"e2",c:"emozioni",l:"Triste",e:"😢",img:null,aud:null,o:1},
    {id:"e3",c:"emozioni",l:"Arrabbiato",e:"😡",img:null,aud:null,o:2},
    {id:"e4",c:"emozioni",l:"Ho paura",e:"😨",img:null,aud:null,o:3},
    {id:"e5",c:"emozioni",l:"Tranquillo",e:"😌",img:null,aud:null,o:4},
    {id:"e6",c:"emozioni",l:"Abbraccio",e:"🤗",img:null,aud:null,o:5},
    {id:"e7",c:"emozioni",l:"Non sto bene",e:"😔",img:null,aud:null,o:6},
    {id:"c1",c:"cibo",l:"Pasta",e:"🍝",img:null,aud:null,o:0},
    {id:"c2",c:"cibo",l:"Pizza",e:"🍕",img:null,aud:null,o:1},
    {id:"c3",c:"cibo",l:"Pane",e:"🍞",img:null,aud:null,o:2},
    {id:"c4",c:"cibo",l:"Cioccolato",e:"🍫",img:null,aud:null,o:3},
    {id:"c5",c:"cibo",l:"Frutta",e:"🍎",img:null,aud:null,o:4},
    {id:"c6",c:"cibo",l:"Biscotti",e:"🍪",img:null,aud:null,o:5},
    {id:"c7",c:"cibo",l:"Latte",e:"🥛",img:null,aud:null,o:6},
    {id:"c8",c:"cibo",l:"Gelato",e:"🍦",img:null,aud:null,o:7},
    {id:"a1",c:"attivita",l:"Tablet",e:"📱",img:null,aud:null,o:0},
    {id:"a2",c:"attivita",l:"Televisione",e:"📺",img:null,aud:null,o:1},
    {id:"a3",c:"attivita",l:"Musica",e:"🎵",img:null,aud:null,o:2},
    {id:"a4",c:"attivita",l:"Uscire",e:"🚶",img:null,aud:null,o:3},
    {id:"a5",c:"attivita",l:"Dormire",e:"🛌",img:null,aud:null,o:4},
    {id:"a6",c:"attivita",l:"Disegnare",e:"✏️",img:null,aud:null,o:5},
    {id:"a7",c:"attivita",l:"Puzzle",e:"🧩",img:null,aud:null,o:6},
    {id:"a8",c:"attivita",l:"Pallone",e:"⚽",img:null,aud:null,o:7},
    {id:"p1",c:"persone",l:"Mamma",e:"👩",img:null,aud:null,o:0},
    {id:"p2",c:"persone",l:"Papà",e:"👨",img:null,aud:null,o:1},
    {id:"p3",c:"persone",l:"Nonno",e:"👴",img:null,aud:null,o:2},
    {id:"p4",c:"persone",l:"Nonna",e:"👵",img:null,aud:null,o:3},
    {id:"p5",c:"persone",l:"Maestra",e:"👩‍🏫",img:null,aud:null,o:4},
    {id:"p6",c:"persone",l:"Dottore",e:"👨‍⚕️",img:null,aud:null,o:5},
    {id:"r1",c:"risposte",l:"Sì",e:"✅",img:null,aud:null,o:0},
    {id:"r2",c:"risposte",l:"No",e:"❌",img:null,aud:null,o:1},
    {id:"r3",c:"risposte",l:"Per favore",e:"🙏",img:null,aud:null,o:2},
    {id:"r4",c:"risposte",l:"Grazie",e:"🙌",img:null,aud:null,o:3},
    {id:"r5",c:"risposte",l:"Aspetta",e:"⏳",img:null,aud:null,o:4},
    {id:"r6",c:"risposte",l:"Ancora",e:"🔁",img:null,aud:null,o:5},
    {id:"r7",c:"risposte",l:"Basta",e:"🛑",img:null,aud:null,o:6},
    {id:"r8",c:"risposte",l:"Va bene",e:"👍",img:null,aud:null,o:7},
    {id:"r9",c:"risposte",l:"Non voglio",e:"👎",img:null,aud:null,o:8}
  ]
};

var D, sentence=[], pinBuf="", pinMode="unlock", curCat=null;

function load(){
  try{ var s=localStorage.getItem("caa4"); if(s){ D=JSON.parse(s); return; } }catch(e){}
  D=JSON.parse(JSON.stringify(DEF));
}
function save(){ try{ localStorage.setItem("caa4",JSON.stringify(D)); }catch(e){} }

function esc(s){ return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
function toast(m){ var t=document.getElementById("toast"); t.textContent=m; t.classList.add("show"); clearTimeout(window._tt); window._tt=setTimeout(function(){ t.classList.remove("show"); },2200); }

// HOME
function renderHome(){
  document.getElementById("catGrid").style.display="grid";
  document.getElementById("cardsView").style.display="none";
  var cats = D.cats.slice().sort(function(a,b){ return a.o-b.o; });
  var html = "";
  for(var i=0; i<cats.length; i++){
    var cat = cats[i];
    var cc = COLORS[i % COLORS.length];
    html += '<div class="catTile ' + cc + '" onclick="openCat(\'' + cat.id + '\')">';
    html += '<span class="te">' + cat.e + '</span>';
    html += '<span class="tl">' + esc(cat.name) + '</span>';
    html += '</div>';
  }
  document.getElementById("catGrid").innerHTML = html;
}

function openCat(id){
  curCat = id;
  var cat = D.cats.find(function(c){ return c.id===id; });
  if(!cat) return;
  document.getElementById("catGrid").style.display="none";
  document.getElementById("cardsView").style.display="block";
  document.getElementById("catLabel").textContent = cat.e + " " + cat.name;
  renderCards();
}

function goHome(){
  document.getElementById("cardsView").style.display="none";
  renderHome();
}

function renderCards(){
  var cards = D.cards.filter(function(c){ return c.c===curCat; }).sort(function(a,b){ return a.o-b.o; });
  var html = "";
  if(!cards.length){
    html = '<div style="grid-column:1/-1;text-align:center;color:#aaa;padding:30px;font-size:14px">Nessuna scheda.<br>Aggiungile dal menu ⚙️</div>';
  } else {
    for(var i=0; i<cards.length; i++){
      var card = cards[i];
      var thumb = card.img ? '<img src="' + card.img + '">' : '<span class="ce">' + card.e + '</span>';
      html += '<div class="card" onclick="tapCard(\'' + card.id + '\')">' + thumb + '<span class="cl">' + esc(card.l) + '</span></div>';
    }
  }
  document.getElementById("cardGrid").innerHTML = html;
}

function tapCard(id){
  var card = D.cards.find(function(c){ return c.id===id; });
  if(!card) return;
  sentence.push(card);
  renderBar();
  if(card.aud){ new Audio(card.aud).play().catch(function(){}); }
  else { tts(card.l, null); }
}

// BAR
function renderBar(){
  var bar = document.getElementById("bar");
  var ph = document.getElementById("ph");
  bar.querySelectorAll(".chip").forEach(function(e){ e.remove(); });
  if(!sentence.length){ ph.style.display=""; return; }
  ph.style.display="none";
  for(var i=0; i<sentence.length; i++){
    (function(card, idx){
      var div = document.createElement("div");
      div.className = "chip";
      var th = card.img ? '<img src="'+card.img+'">' : '<span class="ce">'+card.e+'</span>';
      div.innerHTML = th + '<span class="cl">' + esc(card.l) + '</span>';
      div.onclick = function(){ sentence.splice(idx,1); renderBar(); };
      bar.appendChild(div);
    })(sentence[i], i);
  }
}

function clearAll(){ sentence=[]; renderBar(); }

function speakAll(){
  if(!sentence.length) return;
  var i=0;
  function next(){
    if(i>=sentence.length) return;
    var card=sentence[i++];
    if(card.aud){ var a=new Audio(card.aud); a.onended=next; a.play().catch(next); }
    else { tts(card.l, next); }
  }
  next();
}

function tts(text, cb){
  if(!window.speechSynthesis){ if(cb) cb(); return; }
  window.speechSynthesis.cancel();
  var u = new SpeechSynthesisUtterance(text);
  u.lang="it-IT"; u.rate=0.85;
  if(cb) u.onend=cb;
  window.speechSynthesis.speak(u);
}

// PIN
function askPin(){ pinMode="unlock"; pinBuf=""; document.getElementById("ptitle").textContent="🔒 Inserisci PIN"; document.getElementById("psub").textContent="Area genitori (default: 1234)"; document.getElementById("pinErr").style.display="none"; updDots(); document.getElementById("pinModal").classList.add("show"); }
function showPinChange(){ pinMode="change_old"; pinBuf=""; document.getElementById("ptitle").textContent="🔑 PIN attuale"; document.getElementById("psub").textContent="Inserisci il PIN attuale"; document.getElementById("pinErr").style.display="none"; updDots(); document.getElementById("pinModal").classList.add("show"); }
function pk(k){ if(pinBuf.length>=4) return; pinBuf+=k; updDots(); if(pinBuf.length===4) setTimeout(pkSubmit,150); }
function pkDel(){ pinBuf=pinBuf.slice(0,-1); updDots(); }
function pkCancel(){ document.getElementById("pinModal").classList.remove("show"); pinBuf=""; }
function updDots(){ for(var i=0;i<4;i++) document.getElementById("pd"+i).className="pd"+(i<pinBuf.length?" on":""); }
function pkSubmit(){
  if(pinMode==="unlock"){
    if(pinBuf===D.pin){ document.getElementById("pinModal").classList.remove("show"); goEdit(); }
    else{ document.getElementById("pinErr").style.display="block"; pinBuf=""; updDots(); }
  } else if(pinMode==="change_old"){
    if(pinBuf===D.pin){ pinMode="change_new"; pinBuf=""; updDots(); document.getElementById("ptitle").textContent="🔑 Nuovo PIN"; document.getElementById("psub").textContent="Scegli 4 cifre"; document.getElementById("pinErr").style.display="none"; }
    else{ document.getElementById("pinErr").style.display="block"; pinBuf=""; updDots(); }
  } else {
    D.pin=pinBuf; save(); document.getElementById("pinModal").classList.remove("show"); toast("✅ PIN aggiornato!"); pinBuf="";
  }
}

// EDIT
function goEdit(){ document.getElementById("editScreen").classList.add("show"); renderEdit(); }
function goUse(){ document.getElementById("editScreen").classList.remove("show"); renderHome(); }
function renderEdit(){ renderECats(); renderECards(); }

function renderECats(){
  var cats = D.cats.slice().sort(function(a,b){ return a.o-b.o; });
  var html = "";
  for(var i=0; i<cats.length; i++){
    var cat = cats[i];
    html += '<div class="erow">';
    html += '<span class="dh">☰</span>';
    html += '<input type="text" value="' + esc(cat.e) + '" maxlength="4" style="max-width:52px" onchange="setCatE(\'' + cat.id + '\',this.value)">';
    html += '<input type="text" value="' + esc(cat.name) + '" onchange="setCatN(\'' + cat.id + '\',this.value)">';
    html += '<button class="bdel" onclick="delCat(\'' + cat.id + '\')">🗑</button>';
    html += '</div>';
  }
  document.getElementById("ecats").innerHTML = html;
}

function setCatE(id,v){ var c=D.cats.find(function(x){ return x.id===id; }); if(c){ c.e=v; save(); } }
function setCatN(id,v){ var c=D.cats.find(function(x){ return x.id===id; }); if(c){ c.name=v; save(); } }
function addCat(){
  var id="cat_"+Date.now();
  var mo=D.cats.reduce(function(m,c){ return Math.max(m,c.o); },-1);
  D.cats.push({id:id,name:"Nuova",e:"📁",o:mo+1});
  save(); renderECats(); renderECards(); toast("Categoria aggiunta!");
}
function delCat(id){
  var n=D.cards.filter(function(c){ return c.c===id; }).length;
  if(n>0 && !confirm("Questa categoria ha "+n+" schede. Eliminare?")) return;
  D.cards.filter(function(c){ return c.c===id; }).forEach(function(c){ c.c="__none__"; });
  D.cats=D.cats.filter(function(c){ return c.id!==id; });
  save(); renderECats(); renderECards(); toast("Eliminata");
}

function renderECards(){
  var cats = D.cats.slice().sort(function(a,b){ return a.o-b.o; });
  var html = "";
  for(var ci=0; ci<cats.length; ci++){
    var cat = cats[ci];
    var cards = D.cards.filter(function(c){ return c.c===cat.id; }).sort(function(a,b){ return a.o-b.o; });
    html += '<div class="cblock">';
    html += '<div class="cblock-hd">' + esc(cat.e) + ' ' + esc(cat.name) + '<span style="font-size:11px">' + cards.length + ' schede</span></div>';
    for(var ki=0; ki<cards.length; ki++){
      var card = cards[ki];
      var th = card.img ? '<img src="'+card.img+'" style="width:100%;height:100%;object-fit:cover;border-radius:7px">' : '<span style="font-size:24px">'+card.e+'</span>';
      var opts = "";
      for(var oi=0; oi<cats.length; oi++){
        opts += '<option value="'+cats[oi].id+'"'+(cats[oi].id===card.c?' selected':'')+'>'+esc(cats[oi].e)+' '+esc(cats[oi].name)+'</option>';
      }
      var aLbl = card.aud ? "🔊 ok" : "🎙 Audio";
      var aCls = card.aud ? " has" : "";
      html += '<div class="crow">';
      html += '<div class="cthumb" onclick="pickImg(\''+card.id+'\')">'+th+'</div>';
      html += '<div class="cfields">';
      html += '<input type="text" value="'+esc(card.l)+'" placeholder="Nome" onchange="setCardL(\''+card.id+'\',this.value)">';
      html += '<div class="cmeta">';
      html += '<input type="text" value="'+esc(card.e||'')+'" placeholder="Emoji" maxlength="4" style="max-width:50px" onchange="setCardE(\''+card.id+'\',this.value)">';
      html += '<select onchange="moveCard(\''+card.id+'\',this.value)">'+opts+'</select>';
      html += '<button class="baudio'+aCls+'" id="ab_'+card.id+'" onclick="handleAudio(\''+card.id+'\')">'+aLbl+'</button>';
      html += '</div></div>';
      html += '<button class="bdel" onclick="delCard(\''+card.id+'\')">🗑</button>';
      html += '</div>';
    }
    html += '<button class="badd" onclick="addCard(\''+cat.id+'\')">+ Aggiungi scheda</button>';
    html += '</div>';
  }
  document.getElementById("ecards").innerHTML = html;
}

function setCardL(id,v){ var c=D.cards.find(function(x){ return x.id===id; }); if(c){ c.l=v; save(); } }
function setCardE(id,v){ var c=D.cards.find(function(x){ return x.id===id; }); if(c){ c.e=v; save(); } }
function moveCard(id,catId){
  var c=D.cards.find(function(x){ return x.id===id; }); if(!c) return;
  c.c=catId; save(); toast("Spostata!"); setTimeout(renderECards,200);
}
function addCard(catId){
  var id="card_"+Date.now();
  var n=D.cards.filter(function(c){ return c.c===catId; }).length;
  D.cards.push({id:id,c:catId,l:"Nuova scheda",e:"❓",img:null,aud:null,o:n});
  save(); renderECards(); toast("Scheda aggiunta!");
}
function delCard(id){
  D.cards=D.cards.filter(function(c){ return c.id!==id; });
  save(); renderECards(); toast("Eliminata");
}

var pendImg=null;
function pickImg(id){ pendImg=id; document.getElementById("inpImg").value=""; document.getElementById("inpImg").click(); }
document.getElementById("inpImg").onchange=function(){
  var f=this.files[0]; if(!f||!pendImg) return;
  var r=new FileReader();
  r.onload=function(e){ var c=D.cards.find(function(x){ return x.id===pendImg; }); if(c){ c.img=e.target.result; save(); renderECards(); toast("Foto caricata!"); } };
  r.readAsDataURL(f);
};

var pendAud=null, mr=null, chunks=[], recId=null;
function handleAudio(id){
  var card=D.cards.find(function(c){ return c.id===id; }); if(!card) return;
  if(card.aud){
    if(confirm('"'+card.l+'"\nOK=Ascolta  Annulla=Elimina')){ new Audio(card.aud).play().catch(function(){}); }
    else{ card.aud=null; save(); renderECards(); toast("Audio rimosso"); }
    return;
  }
  if(confirm('"'+card.l+'"\nOK=Registra  Annulla=Carica file')){ startRec(id); }
  else{ pendAud=id; document.getElementById("inpAud").value=""; document.getElementById("inpAud").click(); }
}
document.getElementById("inpAud").onchange=function(){
  var f=this.files[0]; if(!f||!pendAud) return;
  var r=new FileReader();
  r.onload=function(e){ var c=D.cards.find(function(x){ return x.id===pendAud; }); if(c){ c.aud=e.target.result; save(); renderECards(); toast("Audio caricato!"); } };
  r.readAsDataURL(f);
};
function startRec(id){
  if(!navigator.mediaDevices){ alert("Microfono non disponibile"); return; }
  navigator.mediaDevices.getUserMedia({audio:true}).then(function(stream){
    recId=id; chunks=[];
    mr=new MediaRecorder(stream);
    mr.ondataavailable=function(e){ chunks.push(e.data); };
    mr.onstop=function(){
      var blob=new Blob(chunks,{type:"audio/webm"});
      var r=new FileReader();
      r.onload=function(e){ var c=D.cards.find(function(x){ return x.id===recId; }); if(c){ c.aud=e.target.result; save(); renderECards(); toast("Salvata!"); } stream.getTracks().forEach(function(t){ t.stop(); }); };
      r.readAsDataURL(blob);
    };
    mr.start();
    var btn=document.getElementById("ab_"+id);
    if(btn){ btn.textContent="⏹ Ferma"; btn.classList.add("rec"); btn.onclick=function(){ if(mr&&mr.state!=="inactive") mr.stop(); }; }
    toast("🔴 Registrazione... tocca Ferma");
  }).catch(function(){ alert("Microfono non accessibile"); });
}

history.pushState(null,null,location.href);
window.onpopstate=function(){ history.pushState(null,null,location.href); };

load();
renderHome();
</script>
